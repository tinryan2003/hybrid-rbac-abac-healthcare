# Test Profile Configuration
spring.application.name=banking-gateway-test

# Disable security for tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.reactive.ReactiveSecurityAutoConfiguration

# In-memory Redis (or mock)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Disable actuator security
management.endpoints.web.exposure.include=*

# Logging
logging.level.org.springframework=INFO
logging.level.org.vgu.springcloudgateway=DEBUG

