server:
  port: 8098

spring:
  application:
    name: billing-service
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_billing?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: S@l19092003
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/hospital-realm
          jwk-set-uri: http://localhost:8180/realms/hospital-realm/protocol/openid-connect/certs

logging:
  level:
    org.vgu.billingservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
