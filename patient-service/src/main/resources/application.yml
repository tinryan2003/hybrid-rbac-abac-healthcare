server:
  port: 8085

spring:
  application:
    name: patient-service
    
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_patients?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: S@l19092003
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate  # Use validate - tables created by SQL scripts
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        
  # OAuth2 Resource Server (Keycloak)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/hospital-realm
          jwk-set-uri: http://localhost:8180/realms/hospital-realm/protocol/openid-connect/certs

# Keycloak Admin API (optional)
keycloak:
  server-url: http://localhost:8180
  realm: hospital-realm
  admin-username: admin
  admin-password: admin

# Logging
logging:
  level:
    org.vgu.patientservice: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
