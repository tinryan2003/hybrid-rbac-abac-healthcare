server:
  port: 8088

spring:
  application:
    name: notification-service

  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_notifications?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: S@l19092003
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # OAuth2 Resource Server (Keycloak)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/hospital-realm
          jwk-set-uri: http://localhost:8180/realms/hospital-realm/protocol/openid-connect/certs

  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3000
          max-attempts: 3
          multiplier: 2.0

  # Mail Configuration (Gmail example - update with your SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:tinh7800033@gmail.com}
    password: ${MAIL_PASSWORD:bgmv vrcc nhbg gwiu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# RabbitMQ Queue Configuration
rabbitmq:
  queue:
    transaction:
      created: transaction.created.queue
      approved: transaction.approved.queue
      rejected: transaction.rejected.queue
      completed: transaction.completed.queue
  exchange:
    transaction:
      name: transaction.exchange
  routing:
    key:
      transaction:
        created: transaction.created
        approved: transaction.approved
        rejected: transaction.rejected
        completed: transaction.completed

# Notification Configuration
notification:
  email:
    from: ${MAIL_FROM:no-reply@vguhospital.com}
    from-name: VGU Hospital System
  websocket:
    enabled: true

# Logging
logging:
  level:
    org.vgu.notificationservice: DEBUG
    org.springframework.security: DEBUG
    org.springframework.amqp: DEBUG
    org.hibernate.SQL: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
