spring:
  application:
    name: audit-service
  
  # Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/hospital_audit?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: S@l19092003
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

  # Security Configuration (Keycloak - hospital-realm)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/hospital-realm
          jwk-set-uri: http://localhost:8180/realms/hospital-realm/protocol/openid-connect/certs

server:
  port: 8091

# RabbitMQ Queue Names for Audit Events
rabbitmq:
  queue:
    audit:
      name: audit.events.queue
      account:
        name: audit.account.queue
      transaction:
        name: audit.transaction.queue
      customer:
        name: audit.customer.queue
      employee:
        name: audit.employee.queue
      authorization:
        name: audit.authorization.queue
    transaction:
      created: transaction.created.queue
      approved: transaction.approved.queue
      rejected: transaction.rejected.queue
      completed: transaction.completed.queue
  exchange:
    audit:
      name: audit.exchange
    transaction:
      name: transaction.exchange
  routing:
    audit:
      general: audit.general
      account: audit.account
      transaction: audit.transaction
      customer: audit.customer
      employee: audit.employee
      authorization: audit.authorization

# Service URLs
services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8200}

# Feign Client Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
        loggerLevel: basic
  hystrix:
    enabled: false

# Logging
logging:
  level:
    org.vgu.auditservice: DEBUG
    org.springframework.amqp: DEBUG
    org.springframework.cloud.openfeign: DEBUG